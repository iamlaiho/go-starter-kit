root = "."
tmp_dir = "tmp"

[build]
cmd = "go build -o tmp/server ./cmd/server"
bin = "tmp/server"
include_dir = ["cmd", "internal"]
exclude_dir = ["tmp", "vendor", "testdata"]
exclude_file = ["_test.go"]
delay = 1000

[log]
time = false

[color]
main = "magenta"
watcher = "cyan"
build = "yellow"
runner = "green"

[misc]
clean_on_exit = true
